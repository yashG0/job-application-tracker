<form
    id="application-create-form"
    class="application-form"
    hx-post="/pages/applications/new"
    hx-target="#application-list"
    hx-indicator="#global-loader"
>
    <div class="form-header">
        <div>
            <p class="eyebrow">New record</p>
            <h2>Add an application</h2>
        </div>
    </div>

    <label class="field">
        <span>Company</span>
        <input
            type="text"
            name="company"
            placeholder="Acme Inc."
            autocomplete="organization"
            required
        />
    </label>

    <label class="field">
        <span>Position</span>
        <input
            type="text"
            name="position"
            placeholder="Frontend Engineer"
            autocomplete="organization-title"
            required
        />
    </label>

    <label class="field">
        <span>Location</span>
        <input
            type="text"
            name="location"
            placeholder="Remote, Bengaluru, New York..."
            autocomplete="address-level2"
        />
    </label>

    <label class="field">
        <span>Job URL</span>
        <input
            type="url"
            name="job_url"
            placeholder="https://company.com/careers/role"
            inputmode="url"
        />
    </label>

    <label class="field field-full">
        <span>Notes</span>
        <textarea
            name="notes"
            rows="4"
            placeholder="Recruiter, referral, next steps, salary range..."
        ></textarea>
    </label>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            Create Application
        </button>
    </div>
</form>
