<section class="applications-grid">
    {% for app in applications %}

    <a href="/pages/application/{{ app.id }}" class="application-link">
        <article class="application-card">
            <div class="card-header">
                <h2>{{ app.company }}</h2>

                <span class="status-badge status-{{ app.status.name }}">
                    {{ app.status.value }}
                </span>
            </div>

            <div class="card-body">
                <div class="info-row">
                    <span class="label"> Position </span>

                    <span class="value"> {{ app.position }} </span>
                </div>

                <div class="info-row">
                    <span class="label"> Location </span>

                    <span class="value"> {{ app.location or "Not specified" }} </span>
                </div>
            </div>
        </article>
    </a>

    {% else %}

    <div class="empty-state">
        <h2>No applications found</h2>
        <p>Try a different search or add a new application to start tracking.</p>
    </div>

    {% endfor %}
</section>
